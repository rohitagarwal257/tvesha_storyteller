# Static site: HTML + JS + CSS (no build). Express server is optional for local dev only.
[build]
  publish = "."
  command = "echo No build step"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
